<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product — shopwithsmilee</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <style>
        .product-page {
            padding: 120px 6% 80px;
        }

        .product-layout {
            display: grid;
            grid-template-columns: 1.05fr 0.95fr;
            gap: 80px;
            align-items: start;
        }

        .product-images {
            position: sticky;
            top: 100px;
        }

        .main-image {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border: 1px solid var(--border);
            margin-bottom: 12px;
            border-radius: 18px;
        }

        .thumb-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .thumb {
            width: 100%;
            height: 90px;
            object-fit: cover;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
            border-radius: 12px;
        }

        .thumb:hover,
        .thumb.active {
            border-color: var(--accent);
            transform: scale(1.02);
        }

        .product-details h1 {
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .product-details .tag {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            font-family: 'Segoe UI', sans-serif;
            margin-bottom: 20px;
        }

        .price-block {
            font-size: 30px;
            color: var(--accent);
            margin-bottom: 25px;
            font-family: 'Segoe UI', sans-serif;
        }

        .price-block .original {
            font-size: 18px;
            text-decoration: line-through;
            color: var(--text3);
            margin-left: 12px;
        }

        .product-desc {
            font-size: 15px;
            line-height: 1.8;
            color: var(--text2);
            font-family: 'Segoe UI', sans-serif;
            margin-bottom: 30px;
        }

        .options-label {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text3);
            font-family: 'Segoe UI', sans-serif;
            margin-bottom: 12px;
        }

        .color-options {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .color-swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
        }

        .color-swatch:hover,
        .color-swatch.active {
            border-color: var(--accent);
            transform: scale(1.15);
        }

        .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .product-meta {
            border-top: 1px solid var(--border);
            padding-top: 25px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            color: var(--text3);
        }

        .product-meta div {
            margin-bottom: 8px;
        }

        .product-meta span {
            color: var(--text2);
        }

        @media (max-width: 900px) {
            .product-layout {
                grid-template-columns: 1fr;
            }

            .product-images {
                position: static;
            }
        }

        .similar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
            margin-top: 28px;
        }

        .related-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: 18px;
            transition: var(--transition);
        }

        .related-card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
        }

        .related-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 14px;
            margin-bottom: 14px;
        }
    </style>
</head>

<body>
    <div class="cursor"></div>
    <div class="cursor-dot"></div>
    <div class="toast-container" id="toastContainer"></div>

    <header>
        <nav>
            <a href="index.html" class="nav-logo">
                <img src="logo.png" alt="shopwithsmilee">
                <span>shopwithsmilee</span>
            </a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
            </ul>
            <div class="nav-right">
                <button class="theme-toggle" onclick="toggleTheme()"></button>
                <button class="nav-icon" onclick="window.location='cart.html'" style="position:relative;">🛒<div
                        class="cart-badge"></div></button>
                <button class="nav-icon" onclick="openLoginModal()">👤</button>
            </div>
        </nav>
    </header>

    <main class="product-page">
        <div id="productContainer"></div>
    </main>

    <footer style="background:var(--bg2);border-top:1px solid var(--border);padding:30px 6%;text-align:center;">
        <p style="font-size:12px;color:var(--text3);font-family:'Segoe UI',sans-serif;letter-spacing:2px;">
            shopwithsmilee — Discover Joy | Made with ♥
        </p>
    </footer>

    <script src="main.js"></script>
    <script>
        function getProductId() {
            return new URLSearchParams(window.location.search).get('id');
        }

        function setActiveThumb(el) {
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            if (el) el.classList.add('active');
        }

        function renderProductPage() {
            const productId = getProductId();
            const product = window.shopProducts?.find(p => p.id === productId);
            const container = document.getElementById('productContainer');
            if (!container) return;

            if (!product) {
                container.innerHTML = `
          <div style="padding:80px 20px;text-align:center;">
            <h1 style="font-size:32px;color:var(--text);">Product not found</h1>
            <p style="margin:18px 0;color:var(--text3);">Try browsing the full collection instead.</p>
            <a href="products.html" class="btn btn-gold" style="display:inline-block;margin-top:12px;">View All Products</a>
          </div>
        `;
                return;
            }

            container.innerHTML = `
        <p style="font-size:12px;font-family:'Segoe UI',sans-serif;color:var(--text3);letter-spacing:1px;margin-bottom:40px;">
          <a href="index.html" style="color:var(--text3);text-decoration:none;">Home</a> ›
          <a href="products.html" style="color:var(--text3);text-decoration:none;margin:0 6px;">Products</a> ›
          <span style="color:var(--text2);">${product.name}</span>
        </p>
        <div class="product-layout fade">
          <div class="product-images">
            <img class="main-image" id="mainImg" src="${product.image}" alt="${product.name}">
            <div class="thumb-grid" id="thumbGrid"></div>
          </div>
          <div class="product-details">
            <p class="tag">${product.categoryLabel || product.category}</p>
            <h1>${product.name}</h1>
            <div class="price-block">
              ${product.price} <span class="original">${product.original || ''}</span>
            </div>
            <p class="product-desc">${product.description}</p>
            <p class="options-label">Select Color</p>
            <div class="color-options" id="colorOptions"></div>
            <div class="btn-row">
              <button class="btn btn-gold" onclick="addToCart('${product.name}','${product.price}','${product.image}')">Add to Cart 🛒</button>
              <button class="btn btn-accent" onclick="addToWishlist('${product.name}','${product.price}','${product.image}')">Add to Wishlist ♥</button>
              <button class="btn" onclick="goToCategory('${product.category}')">Browse ${product.categoryLabel || product.category}</button>
            </div>
            <div class="product-meta">
              <div>Category: <span>${product.categoryLabel || product.category}</span></div>
              <div>Material: <span>Handcrafted premium materials</span></div>
              <div>Ships in: <span>2-3 business days</span></div>
              <div>Made in: <span>India 🇮🇳</span></div>
            </div>
          </div>
        </div>
        <section style="margin-top:60px;">
          <p class="section-label">Similar Picks</p>
          <h2 class="section-title">You May Also Like</h2>
          <div class="similar-grid" id="similarGrid"></div>
        </section>
      `;

            const variants = ['#c9a84c', '#4a90c4', '#e8d5c4', '#2c2c2c'];
            document.getElementById('colorOptions').innerHTML = variants.map((color, index) => `
        <div class="color-swatch ${index === 0 ? 'active' : ''}" style="background:${color};" onclick="setActiveThumb(this)"></div>
      `).join('');

            const thumbs = [product.image, product.image, product.image, product.image];
            document.getElementById('thumbGrid').innerHTML = thumbs.map(src => `
        <img class="thumb ${src === product.image ? 'active' : ''}" src="${src}" onclick="document.getElementById('mainImg').src='${src}'; setActiveThumb(this)" />
      `).join('');

            const similar = window.shopProducts.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
            document.getElementById('similarGrid').innerHTML = similar.map(p => `
        <a href="product.html?id=${p.id}" class="related-card">
          <img src="${p.image}" alt="${p.name}">
          <p style="font-size:13px;color:var(--text3);margin-bottom:10px;">${p.categoryLabel || p.category}</p>
          <h3 style="font-size:18px;margin:0 0 10px;">${p.name}</h3>
          <p style="font-size:14px;color:var(--accent);font-weight:600;">${p.price}</p>
        </a>
      `).join('');

            setTimeout(() => document.querySelectorAll('.fade').forEach(el => el.classList.add('show')), 50);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderProductPage();
            updateCartBadge();
        });
    </script>
</body>

</html>
